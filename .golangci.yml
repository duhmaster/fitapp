version: "2"

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

issues:
  max-same-issues: 50
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
