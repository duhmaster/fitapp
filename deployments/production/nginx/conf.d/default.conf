# GymMore: gymmore.ru (Flutter) + api.gymmore.ru (API)
# Restrict access: uncomment allow/deny in nginx.conf or here.

upstream api_backend {
    server api:8080;
    keepalive 32;
}

# Flutter web — gymmore.ru
server {
    listen 80;
    server_name gymmore.ru www.gymmore.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    root /var/www/html;
    index index.html;

    location / {
        limit_req zone=web_limit burst=20 nodelay;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Запретить скрытые файлы, кроме /.well-known (нужно для Let's Encrypt)
    location ~ /\.(?!well-known) {
        deny all;
    }
}

# Admin panel — adm.gymmore.ru (тот же backend api:8080, путь /admin)
server {
    listen 80;
    server_name adm.gymmore.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    # Admin is served by backend under /admin.
    location = / {
        return 302 /admin/;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://api_backend/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API — api.gymmore.ru (все запросы проксируются на api:8080)
server {
    listen 80;
    server_name api.gymmore.ru;

    # ACME challenge для Let's Encrypt (served from web root)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    limit_req zone=api_limit burst=20 nodelay;

    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = /health {
        proxy_pass http://api_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}

