# GymMore: gymmore.ru (Flutter) + api.gymmore.ru (API) + adm.gymmore.ru (admin)

upstream api_backend {
    server api:8080;
    keepalive 32;
}

# Порт 80: только редирект на HTTPS (и ACME для Let's Encrypt)
server {
    listen 80;
    server_name gymmore.ru www.gymmore.ru api.gymmore.ru adm.gymmore.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }
    return 301 https://$host$request_uri;
}

# HTTPS — gymmore.ru (Flutter web)
server {
    listen 443 ssl;
    http2 on;
    server_name gymmore.ru www.gymmore.ru;
    ssl_certificate     /etc/letsencrypt/live/gymmore.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gymmore.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    root /var/www/html;
    index index.html;

    # Compression (serve pre-compressed *.gz when present)
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/xml
        image/svg+xml;

    # Cache policy:
    # - index.html + service worker: no-cache (so updates apply)
    # - assets (fingerprinted by Flutter): cache 1y immutable
    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location ^~ /canvaskit/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    # main.dart.js is not fingerprinted: keep it revalidatable
    location = /main.dart.js {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    location / {
        limit_req zone=web_limit burst=20 nodelay;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
    location ~ /\.(?!well-known) { deny all; }
}

# HTTPS — api.gymmore.ru
server {
    listen 443 ssl;
    http2 on;
    server_name api.gymmore.ru;
    ssl_certificate     /etc/letsencrypt/live/gymmore.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gymmore.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    limit_req zone=api_limit burst=20 nodelay;
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    location = /health {
        proxy_pass http://api_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}

# HTTPS — adm.gymmore.ru (админка API на пути /admin; нужен ADMIN_PASSWORD в .env API)
server {
    listen 443 ssl;
    http2 on;
    server_name adm.gymmore.ru;
    ssl_certificate     /etc/letsencrypt/live/gymmore.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gymmore.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    # Двойной слэш -> один слэш (//admin -> /admin)
    location ~ ^// {
        rewrite ^//+(.*)$ /$1 break;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Корень: отдаём как GET /admin (редирект на /admin/login или /admin/dashboard)
    location = / {
        rewrite ^ /admin break;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Все остальные пути проксируем как есть (/admin, /admin/login, ...)
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}