<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>GymMore</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
    .dumbbell { width: 58px; height: 32px; animation: spin 1s linear infinite; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <!-- Логотип GymMore: штанга как в BarbellLogo -->
    <svg class="dumbbell" viewBox="0 0 57.6 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="11.2" y="12.8" width="35.2" height="6.4" rx="3.2" fill="#FF9800"/>
      <circle cx="11.2" cy="16" r="11.2" fill="#FF9800"/>
      <circle cx="11.2" cy="16" r="5.6" fill="#FF9800" fill-opacity="0.3"/>
      <circle cx="46.4" cy="16" r="11.2" fill="#FF9800"/>
      <circle cx="46.4" cy="16" r="5.6" fill="#FF9800" fill-opacity="0.3"/>
    </svg>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
