# GymMore production stack (Ubuntu 24, Docker)
# Run from project root: docker compose -f deployments/production/docker-compose.yml --env-file deployments/production/.env up -d
# Requires: .env file (copy from .env.example), Flutter web build in ./web (see README)

services:
  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ${WEB_ROOT:-./web}:/var/www/html:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - backend

  api:
    image: ${API_IMAGE:-gymmore-api:latest}
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    environment:
      PORT: 8080
      ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-gymmore}
      DB_USER: ${DB_USER:-gymmore}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-168h}
      STORAGE_PATH: /app/uploads
      STORAGE_BASE_URL: ${STORAGE_BASE_URL:-https://api.gymmore.ru/uploads}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://gymmore.ru}
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-gymmore}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-gymmore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gymmore} -d ${DB_NAME:-gymmore}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: ["sh", "-c", "if [ -n \"$$REDIS_PASSWORD\" ]; then exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"; else exec redis-server --appendonly yes; fi"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # One-off: docker compose run --rm migrate (see scripts/production/migrate.sh)
  migrate:
    image: migrate/migrate
    profiles:
      - tools
    volumes:
      - ../../migrations:/migrations
    networks:
      - backend
    entrypoint: []

volumes:
  postgres_data:
  redis_data:
  api_uploads:

networks:
  backend:
    driver: bridge
