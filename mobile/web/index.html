<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>GymMore</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
    .dumbbell { width: 48px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <svg class="dumbbell" viewBox="0 0 48 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="8" width="12" height="8" rx="2" fill="#1976d2"/>
      <rect x="32" y="8" width="12" height="8" rx="2" fill="#1976d2"/>
      <line x1="16" y1="12" x2="32" y2="12" stroke="#1976d2" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
